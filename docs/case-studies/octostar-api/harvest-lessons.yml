name: Harvest PR Lessons

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  harvest:
    # Skip if the PR was closed without merging, or if the author labelled it `no-harvest`.
    if: |
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.labels.*.name, 'no-harvest')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract review lessons
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = pr.number;

            const reviewComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner, repo, pull_number: prNumber }
            );
            const issueComments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: prNumber }
            );

            // Known review/CI bots. Store lowercase — GitHub is inconsistent:
            //  - 'cursor' vs 'cursor[bot]' vs 'Cursor'
            //  - GitHub's Copilot Code Review posts as 'Copilot' (no [bot] suffix!)
            //  - CodeRabbit posts as 'coderabbitai'
            const botLoginsLower = new Set([
              'github-actions', 'changeset-bot',
              'cursor', 'copilot', 'coderabbitai',
              'dependabot', 'codecov', 'renovate',
              'copilot-pull-request-reviewer'
            ]);
            const isHuman = (c) => {
              if (!c.user || !c.user.login) return false;
              const login = c.user.login.toLowerCase();
              if (login.endsWith('[bot]')) return false;
              if (botLoginsLower.has(login)) return false;
              if (botLoginsLower.has(login.replace(/\[bot\]$/, ''))) return false;
              return true;
            };

            const humanReviewComments = reviewComments.filter(isHuman);
            const humanIssueComments = issueComments.filter(isHuman);

            const isSubstantive = (body) => {
              if (!body || body.trim().length < 40) return false;
              if (/^(lgtm|looks good|nice|thanks|ty|approved|shipit)[.!]?\s*$/i.test(body.trim())) return false;
              const lines = body.trim().split('\n');
              if (lines.every(l => !l.trim() || /^\s*-\s*\[[ x]\]/.test(l.trim()))) return false;
              return true;
            };

            const substantiveReviews = humanReviewComments.filter(c => isSubstantive(c.body));
            const substantiveIssue = humanIssueComments.filter(c => isSubstantive(c.body));

            if (substantiveReviews.length === 0 && substantiveIssue.length === 0) {
              console.log('No substantive human comments. Skipping.');
              return;
            }

            const bugbotComments = reviewComments.filter(c => c.user && (c.user.login === 'cursor' || c.user.login === 'cursor[bot]'));

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: prNumber }
            );

            // GENERATED BY /pr-war-stories setup — edit if your directory layout changes.
            // Each entry maps a path prefix to the scope name of its .cursor/BUGBOT.md file.
            // Example monorepo:
            //   { prefix: 'apps/frontend/', scope: 'frontend' },
            //   { prefix: 'apps/backend/',  scope: 'backend'  },
            //   { prefix: 'packages/',      scope: 'packages' },
            // Generated by /pr-war-stories setup — order is DEEPEST-FIRST so the
            // longest matching prefix wins. All module files live under app/api/v1/,
            // so ordering here is purely alphabetical among siblings.
            const scopeRules = [
              { prefix: 'app/api/v1/pipeline/', scope: 'pipeline' },
              { prefix: 'app/api/v1/entities/', scope: 'entities' },
              { prefix: 'app/api/v1/common/',   scope: 'common'   },
              { prefix: 'app/api/v1/apps/',     scope: 'apps'     },
              { prefix: 'app/api/v1/files/',    scope: 'files'    },
              { prefix: 'app/api/v1/sets/',     scope: 'sets'     },
              { prefix: 'app/api/v1/ai/',       scope: 'ai'       },
            ];

            // Defensive: normalize prefix to always end in '/' so
            // 'apps/frontend' doesn't accidentally match 'apps/frontend-backup/'.
            const matchesScope = (filename, prefix) => {
              const p = prefix.endsWith('/') ? prefix : prefix + '/';
              return filename.startsWith(p);
            };

            const affectedScopes = new Set(['global']);
            for (const f of files) {
              for (const rule of scopeRules) {
                if (matchesScope(f.filename, rule.prefix)) {
                  affectedScopes.add(rule.scope);
                  break;
                }
              }
            }

            let body = `## Lesson Harvest for PR #${prNumber}\n\n`;
            body += `**${substantiveReviews.length}** inline review + **${substantiveIssue.length}** general human comments.`;
            body += ` Bugbot posted **${bugbotComments.length}** comments.\n`;
            body += `Scopes: ${[...affectedScopes].map(s => '`' + s + '`').join(', ')}\n\n`;

            body += `### Review Comments\n\n`;
            for (const c of substantiveReviews.slice(0, 10)) {
              const file = c.path || 'unknown';
              const line = c.line || c.original_line || '?';
              const text = c.body.length > 300 ? c.body.slice(0, 300) + '...' : c.body;
              body += `**${c.user.login}** on \`${file}:${line}\`:\n`;
              body += `> ${text.replace(/\n/g, '\n> ')}\n\n`;
            }
            for (const c of substantiveIssue.slice(0, 5)) {
              const text = c.body.length > 300 ? c.body.slice(0, 300) + '...' : c.body;
              body += `**${c.user.login}**: ${text.replace(/\n/g, '\n> ')}\n\n`;
            }

            body += `---\n**Next:** run \`/pr-war-stories harvest\` to classify and commit.\n`;

            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body
            });
